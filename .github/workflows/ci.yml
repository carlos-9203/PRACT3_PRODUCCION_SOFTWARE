name: CI

on:
  push:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Install ruff and mypy
        run: uv pip install ruff mypy pytest

      - name: Ruff format
        run: uv ruff format --check 

      - name: Ruff linter
        run: uv ruff check .

      - name: Mypy
        run: mypy .

      - name: Unit tests
        run: pytest tests/unit

      - name: Integration tests
        run: pytest tests/integration

      - name: BDD tests
        run: pytest tests/bdd